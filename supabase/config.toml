# Production auth configuration for Unique Sky Way V2 (lngjjttkiuqlclalccah).
# Keep this aligned with Dashboard Auth settings.

[auth]
enabled = true
site_url = "https://uniqueskyway.com"
additional_redirect_urls = [
  "https://uniqueskyway.com/**",
  "https://www.uniqueskyway.com/**",
  "http://localhost:3000/**",
  "http://127.0.0.1:3000/**"
]
enable_signup = true

[auth.email]
enable_signup = true
double_confirm_changes = true
enable_confirmations = true
secure_password_change = false
max_frequency = "1m0s"
otp_length = 8
otp_expiry = 3600

[auth.mfa]
max_enrolled_factors = 10

[auth.mfa.totp]
enroll_enabled = true
verify_enabled = true

[auth.mfa.phone]
enroll_enabled = false
verify_enabled = false

[vector]
enabled = false
